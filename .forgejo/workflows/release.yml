name: Release

on:
  push:
    tags: ["v*"]

jobs:
  containers-amd64:
    runs-on: amd64
    container:
      image: docker:29-dind
      options: --privileged

    steps:
      - name: Install checkout dependencies
        run: apk add --no-cache nodejs git

      - uses: actions/checkout@v6

      - name: Start Docker daemon
        run: |
          dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz &
          timeout 60 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login --username=james --password-stdin forgejo.dmz

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login --username=jimsynz --password-stdin ghcr.io

      - name: Set up Docker Buildx
        run: |
          cat > /tmp/buildkitd.toml << 'TOML'
          [registry."forgejo.dmz"]
            http = true
            insecure = true
          TOML
          docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
          docker buildx use builder

      - name: Build all targets
        run: |
          TAG=${GITHUB_REF_NAME#v}-amd64
          for target in base cli core fuse nfs s3 webdav docker csi omnibus; do
            PLATFORMS=linux/amd64 TAG=$TAG ./containers/bake.sh --pull --load "$target"
          done

      - name: Push all targets
        run: |
          TAG=${GITHUB_REF_NAME#v}-amd64
          for image in core fuse nfs s3 webdav docker csi omnibus cli; do
            docker push "forgejo.dmz/project-neon/neonfs/${image}:${TAG}"
            docker push "ghcr.io/jimsynz/neonfs/${image}:${TAG}"
          done

  containers-arm64:
    runs-on: arm64
    container:
      image: docker:29-dind
      options: --privileged

    steps:
      - name: Install checkout dependencies
        run: apk add --no-cache nodejs git

      - uses: actions/checkout@v6

      - name: Start Docker daemon
        run: |
          dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz &
          timeout 60 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login --username=james --password-stdin forgejo.dmz

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login --username=jimsynz --password-stdin ghcr.io

      - name: Set up Docker Buildx
        run: |
          cat > /tmp/buildkitd.toml << 'TOML'
          [registry."forgejo.dmz"]
            http = true
            insecure = true
          TOML
          docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
          docker buildx use builder

      - name: Build all targets
        run: |
          TAG=${GITHUB_REF_NAME#v}-arm64
          for target in base cli core fuse nfs s3 webdav docker csi omnibus; do
            PLATFORMS=linux/arm64 TAG=$TAG ./containers/bake.sh --pull --load "$target"
          done

      - name: Push all targets
        run: |
          TAG=${GITHUB_REF_NAME#v}-arm64
          for image in core fuse nfs s3 webdav docker csi omnibus cli; do
            docker push "forgejo.dmz/project-neon/neonfs/${image}:${TAG}"
            docker push "ghcr.io/jimsynz/neonfs/${image}:${TAG}"
          done

  containers-manifest:
    runs-on: amd64
    needs: [containers-amd64, containers-arm64]
    container:
      image: docker:29-dind
      options: --privileged

    steps:
      - name: Start Docker daemon
        run: |
          dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz &
          timeout 60 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login --username=james --password-stdin forgejo.dmz

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login --username=jimsynz --password-stdin ghcr.io

      - name: Set up Docker Buildx
        run: |
          cat > /tmp/buildkitd.toml << 'TOML'
          [registry."forgejo.dmz"]
            http = true
            insecure = true
          TOML
          docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
          docker buildx use builder

      - name: Create multi-arch manifests
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGES="core fuse nfs s3 webdav docker csi omnibus cli"

          for image in $IMAGES; do
            docker buildx imagetools create \
              -t forgejo.dmz/project-neon/neonfs/${image}:${VERSION} \
              forgejo.dmz/project-neon/neonfs/${image}:${VERSION}-amd64 \
              forgejo.dmz/project-neon/neonfs/${image}:${VERSION}-arm64

            docker buildx imagetools create \
              -t ghcr.io/jimsynz/neonfs/${image}:${VERSION} \
              ghcr.io/jimsynz/neonfs/${image}:${VERSION}-amd64 \
              ghcr.io/jimsynz/neonfs/${image}:${VERSION}-arm64

            docker buildx imagetools create \
              -t forgejo.dmz/project-neon/neonfs/${image}:latest \
              forgejo.dmz/project-neon/neonfs/${image}:${VERSION}-amd64 \
              forgejo.dmz/project-neon/neonfs/${image}:${VERSION}-arm64

            docker buildx imagetools create \
              -t ghcr.io/jimsynz/neonfs/${image}:latest \
              ghcr.io/jimsynz/neonfs/${image}:${VERSION}-amd64 \
              ghcr.io/jimsynz/neonfs/${image}:${VERSION}-arm64
          done

  # =========================================================================
  # Debian packages - Native multi-arch builds
  # Build each architecture on its own native runner, then upload to Forgejo.
  # =========================================================================
  debs-amd64:
    runs-on: amd64
    container:
      image: harton.dev/james/asdf_container:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore toolchain cache
        uses: actions/cache@v5
        with:
          path: |
            .asdf
            .hex
            .mix
            .cargo
          key: toolchain-amd64-${{ hashFiles('.tool-versions') }}

      - name: Install ASDF tools
        run: |
          export ASDF_DATA_DIR="$FORGEJO_WORKSPACE/.asdf"
          export HEX_HOME="$FORGEJO_WORKSPACE/.hex"
          export MIX_HOME="$FORGEJO_WORKSPACE/.mix"
          export CARGO_HOME="$FORGEJO_WORKSPACE/.cargo"
          export PATH="$ASDF_DATA_DIR/shims:$PATH"
          asdf_install
          asdf reshim

      - name: Install nfpm
        run: |
          # renovate: datasource=github-releases depName=goreleaser/nfpm
          NFPM_VERSION=v2.46.1
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/nfpm_${NFPM_VERSION#v}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin nfpm

      - name: Build releases
        run: |
          export ASDF_DATA_DIR="$FORGEJO_WORKSPACE/.asdf"
          export HEX_HOME="$FORGEJO_WORKSPACE/.hex"
          export MIX_HOME="$FORGEJO_WORKSPACE/.mix"
          export CARGO_HOME="$FORGEJO_WORKSPACE/.cargo"
          export PATH="$ASDF_DATA_DIR/shims:$PATH"

          # Build CLI
          cd neonfs-cli && cargo build --release && cd ..

          # Build Elixir releases
          for component in neonfs_core neonfs_fuse neonfs_nfs neonfs_s3 neonfs_webdav neonfs_docker neonfs_omnibus; do
            cd "$component"
            mix local.hex --force && mix local.rebar --force
            mix deps.get --only prod
            MIX_ENV=prod mix compile
            MIX_ENV=prod mix release --overwrite
            cd ..
          done

      - name: Package .deb files
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          export VERSION ARCH=amd64 BUILD_DIR="$FORGEJO_WORKSPACE"
          mkdir -p dist

          cd packaging/nfpm
          for config in neonfs-cli neonfs-common neonfs-core neonfs-fuse neonfs-nfs neonfs-s3 neonfs-webdav neonfs-docker neonfs-omnibus; do
            envsubst < "${config}.yaml" > ".generated-${config}.yaml"
            nfpm package --config ".generated-${config}.yaml" --packager deb --target "$FORGEJO_WORKSPACE/dist/"
            rm -f ".generated-${config}.yaml"
          done

      - name: Upload .deb artifacts
        uses: forgejo/upload-artifact@v5
        with:
          name: debs-amd64
          path: dist/*.deb

  debs-arm64:
    runs-on: arm64
    container:
      image: harton.dev/james/asdf_container:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore toolchain cache
        uses: actions/cache@v5
        with:
          path: |
            .asdf
            .hex
            .mix
            .cargo
          key: toolchain-arm64-${{ hashFiles('.tool-versions') }}

      - name: Install ASDF tools
        run: |
          export ASDF_DATA_DIR="$FORGEJO_WORKSPACE/.asdf"
          export HEX_HOME="$FORGEJO_WORKSPACE/.hex"
          export MIX_HOME="$FORGEJO_WORKSPACE/.mix"
          export CARGO_HOME="$FORGEJO_WORKSPACE/.cargo"
          export PATH="$ASDF_DATA_DIR/shims:$PATH"
          asdf_install
          asdf reshim

      - name: Install nfpm
        run: |
          # renovate: datasource=github-releases depName=goreleaser/nfpm
          NFPM_VERSION=v2.46.1
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/nfpm_${NFPM_VERSION#v}_Linux_arm64.tar.gz" \
            | tar xz -C /usr/local/bin nfpm

      - name: Build releases
        run: |
          export ASDF_DATA_DIR="$FORGEJO_WORKSPACE/.asdf"
          export HEX_HOME="$FORGEJO_WORKSPACE/.hex"
          export MIX_HOME="$FORGEJO_WORKSPACE/.mix"
          export CARGO_HOME="$FORGEJO_WORKSPACE/.cargo"
          export PATH="$ASDF_DATA_DIR/shims:$PATH"

          # Build CLI
          cd neonfs-cli && cargo build --release && cd ..

          # Build Elixir releases
          for component in neonfs_core neonfs_fuse neonfs_nfs neonfs_s3 neonfs_webdav neonfs_docker neonfs_omnibus; do
            cd "$component"
            mix local.hex --force && mix local.rebar --force
            mix deps.get --only prod
            MIX_ENV=prod mix compile
            MIX_ENV=prod mix release --overwrite
            cd ..
          done

      - name: Package .deb files
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          export VERSION ARCH=arm64 BUILD_DIR="$FORGEJO_WORKSPACE"
          mkdir -p dist

          cd packaging/nfpm
          for config in neonfs-cli neonfs-common neonfs-core neonfs-fuse neonfs-nfs neonfs-s3 neonfs-webdav neonfs-docker neonfs-omnibus; do
            envsubst < "${config}.yaml" > ".generated-${config}.yaml"
            nfpm package --config ".generated-${config}.yaml" --packager deb --target "$FORGEJO_WORKSPACE/dist/"
            rm -f ".generated-${config}.yaml"
          done

      - name: Upload .deb artifacts
        uses: forgejo/upload-artifact@v5
        with:
          name: debs-arm64
          path: dist/*.deb

  debs-upload:
    runs-on: docker
    needs: [debs-amd64, debs-arm64]
    container:
      image: harton.dev/james/asdf_container:latest

    steps:
      - name: Download amd64 .deb artifacts
        uses: forgejo/download-artifact@v7
        with:
          name: debs-amd64
          path: dist/

      - name: Download arm64 .deb artifacts
        uses: forgejo/download-artifact@v7
        with:
          name: debs-arm64
          path: dist/

      - name: Upload to Forgejo Debian repository
        run: |
          for deb in dist/*.deb; do
            echo "Uploading $(basename "$deb")..."
            curl -sf \
              -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
              --upload-file "$deb" \
              "https://harton.dev/api/packages/project-neon/debian/pool/trixie/main/upload"
          done

  forgejo-release:
    runs-on: docker
    needs: [containers-manifest, debs-upload]
    container:
      image: harton.dev/james/asdf_container:latest

    steps:
      - uses: actions/checkout@v6

      - name: Download amd64 .deb artifacts
        uses: forgejo/download-artifact@v7
        with:
          name: debs-amd64
          path: dist/

      - name: Download arm64 .deb artifacts
        uses: forgejo/download-artifact@v7
        with:
          name: debs-arm64
          path: dist/

      - name: Extract changelog and create release
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          CHANGELOG=$(awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)

          # Create the release
          RELEASE_ID=$(curl -sf -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "${{ github.ref_name }}" \
              --arg name "${{ github.ref_name }}" \
              --arg body "$CHANGELOG" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}'
            )" | jq -r '.id')

          # Attach .deb files as release assets
          for deb in dist/*.deb; do
            echo "Attaching $(basename "$deb") to release..."
            curl -sf \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -X POST \
              "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=$(basename "$deb")" \
              -F "attachment=@${deb}" \
              > /dev/null
          done
