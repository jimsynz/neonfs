name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  MIX_ENV: test

jobs:
  # ==========================================================================
  # Resolve tool versions from .tool-versions so all jobs use the same images
  # ==========================================================================
  resolve-versions:
    runs-on: docker
    container:
      image: debian:trixie-20260316-slim
    outputs:
      elixir: ${{ steps.parse.outputs.elixir }}
      erlang: ${{ steps.parse.outputs.erlang }}
      rust: ${{ steps.parse.outputs.rust }}
      hexpm_image: ${{ steps.parse.outputs.hexpm_image }}
      rust_image: ${{ steps.parse.outputs.rust_image }}
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install -y --no-install-recommends nodejs git ca-certificates && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - id: parse
        run: |
          ELIXIR=$(awk '/^elixir/ {print $2}' .tool-versions)
          ERLANG=$(awk '/^erlang/ {print $2}' .tool-versions)
          RUST=$(awk '/^rust/ {print $2}' .tool-versions)
          echo "elixir=${ELIXIR}" >> "$GITHUB_OUTPUT"
          echo "erlang=${ERLANG}" >> "$GITHUB_OUTPUT"
          echo "rust=${RUST}" >> "$GITHUB_OUTPUT"
          echo "hexpm_image=hexpm/elixir:${ELIXIR}-erlang-${ERLANG}-debian-trixie-20260316-slim" >> "$GITHUB_OUTPUT"
          echo "rust_image=rust:${RUST}-slim-trixie" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # neonfs_client - Pure Elixir shared types & service discovery
  # =========================================================================
  neonfs_client:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install -y --no-install-recommends nodejs git ca-certificates && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
          key: v2-build-neonfs_client-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ hashFiles('neonfs_client/mix.lock') }}
          restore-keys: v2-build-neonfs_client-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_client
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_client
        run: |
          mix check

  # =========================================================================
  # neonfs_core - Elixir + Rustler NIFs
  # =========================================================================
  neonfs_core:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_core/deps
            neonfs_core/_build
            neonfs_core/target
            neonfs_core/priv/native
          key: v2-build-neonfs_core-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_core/mix.lock', 'neonfs_core/Cargo.lock') }}
          restore-keys: v2-build-neonfs_core-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_core
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_core
        run: |
          mix check

  # =========================================================================
  # neonfs_fuse - Elixir + Rustler NIFs
  # =========================================================================
  neonfs_fuse:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
      options: --privileged --device /dev/fuse
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs libfuse3-dev fuse3 \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_fuse/deps
            neonfs_fuse/_build
            neonfs_fuse/target
            neonfs_fuse/priv/native
          key: v2-build-neonfs_fuse-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_fuse/mix.lock', 'neonfs_fuse/Cargo.lock') }}
          restore-keys: v2-build-neonfs_fuse-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_fuse
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_fuse
        run: |
          mix check

  # =========================================================================
  # neonfs_nfs - Elixir + Rustler NIFs (NFSv3 server)
  # =========================================================================
  neonfs_nfs:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_nfs/deps
            neonfs_nfs/_build
            neonfs_nfs/target
            neonfs_nfs/priv/native
          key: v2-build-neonfs_nfs-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_nfs/mix.lock', 'neonfs_nfs/native/neonfs_nfs/Cargo.lock') }}
          restore-keys: v2-build-neonfs_nfs-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_nfs
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_nfs
        run: |
          mix check

  # =========================================================================
  # s3_server - Standalone S3-compatible server library (pure Elixir)
  # =========================================================================
  s3_server:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install -y --no-install-recommends nodejs git ca-certificates && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            s3_server/deps
            s3_server/_build
          key: v2-build-s3_server-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ hashFiles('s3_server/mix.lock') }}
          restore-keys: v2-build-s3_server-${{ runner.arch }}-

      - name: Build
        working-directory: s3_server
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: s3_server
        run: |
          mix check

  # =========================================================================
  # neonfs_s3 - S3-compatible API interface (pure Elixir)
  # =========================================================================
  neonfs_s3:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install -y --no-install-recommends nodejs git ca-certificates && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            s3_server/deps
            s3_server/_build
            neonfs_s3/deps
            neonfs_s3/_build
          key: v2-build-neonfs_s3-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ hashFiles('neonfs_s3/mix.lock') }}
          restore-keys: v2-build-neonfs_s3-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_s3
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_s3
        run: |
          mix check

  # =========================================================================
  # neonfs-cli - Rust CLI
  # =========================================================================
  neonfs-cli:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.rust_image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            pkg-config libssl-dev git nodejs ca-certificates \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs-cli/target
          key: v2-build-neonfs-cli-${{ runner.arch }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs-cli/Cargo.lock') }}
          restore-keys: v2-build-neonfs-cli-${{ runner.arch }}-

      - name: Setup clippy
        run: rustup component add clippy

      - name: Build
        working-directory: neonfs-cli
        run: |
          cargo fetch
          cargo test --no-run --release

      - name: Test
        working-directory: neonfs-cli
        run: cargo test --jobs 1 --release

      - name: Clippy
        working-directory: neonfs-cli
        run: cargo clippy --all-targets --all-features -- -D warnings

  # =========================================================================
  # neonfs_integration - Integration tests
  # =========================================================================
  neonfs_integration:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
      options: --privileged --device /dev/fuse
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs \
            libfuse3-dev fuse3 e2fsprogs mount \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_integration/deps
            neonfs_integration/_build
            neonfs_integration/target
            neonfs_integration/priv/native
            neonfs_core/target
            neonfs_core/priv/native
            neonfs_fuse/target
            neonfs_fuse/priv/native
          key: v2-build-neonfs_integration-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_integration/mix.lock', 'neonfs_core/Cargo.lock', 'neonfs_fuse/Cargo.lock') }}
          restore-keys: v2-build-neonfs_integration-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_integration
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          mix compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Enable loopback devices
        run: |
          modprobe loop max_loop=64 || true
          [ -e /dev/loop-control ] || mknod /dev/loop-control c 10 237
          for i in $(seq 0 63); do
            [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i
          done

      - name: Check
        working-directory: neonfs_integration
        run: |
          mix check
