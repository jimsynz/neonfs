name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MIX_ENV: test
  # Cap the BEAM port table size. Docker 25+ containers inherit an
  # enormous RLIMIT_NOFILE (~1e9), which OTP uses to size the port table
  # and allocates ~1.6 GB per VM before user code runs.
  ERL_ZFLAGS: "+Q 65536"

jobs:
  # ==========================================================================
  # Resolve tool versions from .tool-versions so all jobs use the same images
  # ==========================================================================
  resolve-versions:
    runs-on: docker
    container:
      image: harton.dev/james/workflows/ci-base:latest
    outputs:
      elixir: ${{ steps.parse.outputs.elixir }}
      erlang: ${{ steps.parse.outputs.erlang }}
      rust: ${{ steps.parse.outputs.rust }}
      elixir_image: ${{ steps.parse.outputs.elixir_image }}
      elixir_rust_image: ${{ steps.parse.outputs.elixir_rust_image }}
      rust_image: ${{ steps.parse.outputs.rust_image }}
    steps:
      - uses: actions/checkout@v6
      - id: parse
        run: |
          ELIXIR=$(awk '/^elixir/ {print $2}' .tool-versions)
          ERLANG=$(awk '/^erlang/ {print $2}' .tool-versions)
          RUST=$(awk '/^rust/ {print $2}' .tool-versions)
          echo "elixir=${ELIXIR}" >> "$GITHUB_OUTPUT"
          echo "erlang=${ERLANG}" >> "$GITHUB_OUTPUT"
          echo "rust=${RUST}" >> "$GITHUB_OUTPUT"
          echo "elixir_image=harton.dev/james/workflows/elixir:${ELIXIR}-erlang-${ERLANG}" >> "$GITHUB_OUTPUT"
          echo "elixir_rust_image=harton.dev/james/workflows/elixir-rust:${ELIXIR}-erlang-${ERLANG}-rust-${RUST}" >> "$GITHUB_OUTPUT"
          echo "rust_image=harton.dev/james/workflows/rust:${RUST}" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # buffering-check - Guard against whole-file buffering regressions (#254)
  # =========================================================================
  buffering-check:
    runs-on: docker
    container:
      image: harton.dev/james/workflows/ci-base:latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for whole-file buffering patterns
        run: bash scripts/check_buffering.sh

  # =========================================================================
  # neonfs_client - Elixir shared types, service discovery, and the
  # neonfs_chunker NIF (interface-side chunker, #449).
  # =========================================================================
  neonfs_client:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
          key: v3-build-neonfs_client-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_client/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock') }}
          restore-keys: v3-build-neonfs_client-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_client
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_client
        run: mix check

  # =========================================================================
  # neonfs_core - Elixir + Rustler NIFs
  # =========================================================================
  neonfs_core:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_core/deps
            neonfs_core/_build
            neonfs_core/target
            neonfs_core/priv/native
          key: v3-build-neonfs_core-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_core/mix.lock', 'neonfs_core/Cargo.lock') }}
          restore-keys: v3-build-neonfs_core-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_core
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_core
        run: mix check

  # =========================================================================
  # neonfs_fuse - Elixir + Rustler NIFs
  # =========================================================================
  neonfs_fuse:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
      options: --privileged --device /dev/fuse
    steps:
      - name: Install FUSE dependencies
        run: apt-get update && apt-get install -y --no-install-recommends libfuse3-dev fuse3 && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_core/target
            neonfs_core/priv/native
            fuse_server/target
            fuse_server/priv/native
            neonfs_fuse/deps
            neonfs_fuse/_build
            neonfs_fuse/target
            neonfs_fuse/priv/native
          key: v4-build-neonfs_fuse-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_fuse/mix.lock', 'neonfs_fuse/Cargo.lock', 'neonfs_core/Cargo.lock', 'fuse_server/Cargo.lock') }}
          restore-keys: v4-build-neonfs_fuse-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_fuse
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_fuse
        run: mix check

  # =========================================================================
  # neonfs_docker - Docker VolumeDriver plugin. Transitively pulls the
  # neonfs_chunker NIF through its neonfs_client dep (#449).
  # =========================================================================
  neonfs_docker:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_docker/deps
            neonfs_docker/_build
          key: v3-build-neonfs_docker-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_docker/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock') }}
          restore-keys: v3-build-neonfs_docker-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_docker
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_docker
        run: mix check

  # =========================================================================
  # neonfs_cifs - Samba VFS module backend (Elixir-only; UDS + ETF over
  # `vfs_neonfs.so`; pulls the chunker NIF through its neonfs_client dep).
  # =========================================================================
  neonfs_cifs:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_cifs/deps
            neonfs_cifs/_build
          key: v3-build-neonfs_cifs-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_cifs/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock') }}
          restore-keys: v3-build-neonfs_cifs-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_cifs
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_cifs
        run: mix check

  # =========================================================================
  # neonfs_csi - Kubernetes CSI driver (Elixir-only; gRPC over UDS via the
  # `grpc` + `protobuf` hex packages). The CSI v1 protobuf bindings under
  # `lib/csi/` are checked in (regenerate locally via `protoc-gen-elixir`).
  # =========================================================================
  neonfs_csi:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_csi/deps
            neonfs_csi/_build
          key: v3-build-neonfs_csi-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_csi/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock') }}
          restore-keys: v3-build-neonfs_csi-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_csi
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_csi
        run: mix check

  # =========================================================================
  # neonfs_nfs - Elixir + Rustler NIFs (NFSv3 server)
  # =========================================================================
  neonfs_nfs:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_nfs/deps
            neonfs_nfs/_build
            neonfs_nfs/target
            neonfs_nfs/priv/native
          key: v3-build-neonfs_nfs-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_nfs/mix.lock', 'neonfs_nfs/native/neonfs_nfs/Cargo.lock') }}
          restore-keys: v3-build-neonfs_nfs-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_nfs
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_nfs
        run: mix check

  # =========================================================================
  # fuse_server - Standalone FUSE transport library (Elixir + Rustler NIFs)
  # =========================================================================
  fuse_server:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            fuse_server/deps
            fuse_server/_build
            fuse_server/target
            fuse_server/priv/native
          key: v3-build-fuse_server-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('fuse_server/mix.lock', 'fuse_server/Cargo.lock') }}
          restore-keys: v3-build-fuse_server-${{ runner.arch }}-

      - name: Build
        working-directory: fuse_server
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: fuse_server
        run: mix check

  # =========================================================================
  # nfs_server - Standalone NFSv3/XDR server library (pure Elixir)
  # =========================================================================
  nfs_server:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            nfs_server/deps
            nfs_server/_build
          key: v3-build-nfs_server-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ hashFiles('nfs_server/mix.lock') }}
          restore-keys: v3-build-nfs_server-${{ runner.arch }}-

      - name: Build
        working-directory: nfs_server
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: nfs_server
        run: mix check

  # =========================================================================
  # neonfs_s3 - S3-compatible API interface. Transitively pulls the
  # neonfs_chunker NIF through its neonfs_client dep (#449).
  # =========================================================================
  neonfs_s3:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_core/target
            neonfs_core/priv/native
            neonfs_s3/deps
            neonfs_s3/_build
          key: v4-build-neonfs_s3-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_s3/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock', 'neonfs_core/Cargo.lock') }}
          restore-keys: v4-build-neonfs_s3-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_s3
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_s3
        run: mix check

  # =========================================================================
  # neonfs_webdav - WebDAV interface. Transitively pulls the
  # neonfs_chunker NIF through its neonfs_client dep (#449).
  # =========================================================================
  neonfs_webdav:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_core/target
            neonfs_core/priv/native
            webdav_server/deps
            webdav_server/_build
            neonfs_webdav/deps
            neonfs_webdav/_build
          key: v4-build-neonfs_webdav-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_webdav/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock', 'neonfs_core/Cargo.lock') }}
          restore-keys: v4-build-neonfs_webdav-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_webdav
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_webdav
        run: mix check

  # =========================================================================
  # neonfs_iam - IAM package (Ash resources). Transitively pulls the
  # neonfs_chunker NIF through its neonfs_client dep (#449).
  # =========================================================================
  neonfs_iam:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_iam/deps
            neonfs_iam/_build
          key: v3-build-neonfs_iam-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_iam/mix.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock') }}
          restore-keys: v3-build-neonfs_iam-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_iam
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_iam
        run: mix check

  # =========================================================================
  # neonfs-cli - Rust CLI
  # =========================================================================
  neonfs-cli:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs-cli/target
          key: v3-build-neonfs-cli-${{ runner.arch }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs-cli/Cargo.lock') }}
          restore-keys: v3-build-neonfs-cli-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs-cli
        run: |
          cargo fetch
          cargo test --no-run --release

      - name: Test
        working-directory: neonfs-cli
        run: cargo test --jobs 1 --release

      - name: Clippy
        working-directory: neonfs-cli
        run: cargo clippy --all-targets --all-features -- -D warnings

  # =========================================================================
  # neonfs_integration - Integration tests
  # =========================================================================
  neonfs_integration:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
      options: --privileged --device /dev/fuse
    steps:
      - name: Install FUSE, loopback, and Docker dependencies
        run: |
          # Debian Trixie split docker.io: the daemon (`dockerd`) ships
          # in `docker.io`, but the `docker` CLI binary moved to a
          # separate `docker-cli` package which is only pulled in via
          # Recommends. With `--no-install-recommends` we have to ask
          # for it explicitly or the e2e test sees `dockerd` running
          # but no `docker` on PATH.
          apt-get update
          apt-get install -y --no-install-recommends \
            libfuse3-dev fuse3 e2fsprogs mount \
            docker.io docker-cli iptables
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_client/native/neonfs_chunker/target
            neonfs_client/priv/native
            neonfs_integration/deps
            neonfs_integration/_build
            neonfs_integration/target
            neonfs_integration/priv/native
            neonfs_core/target
            neonfs_core/priv/native
            neonfs_fuse/target
            neonfs_fuse/priv/native
          key: v4-build-neonfs_integration-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_integration/mix.lock', 'neonfs_core/Cargo.lock', 'neonfs_fuse/Cargo.lock', 'neonfs_client/native/neonfs_chunker/Cargo.lock') }}
          restore-keys: v4-build-neonfs_integration-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_integration
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          mix compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Enable loopback devices
        run: |
          modprobe loop max_loop=64 || true
          [ -e /dev/loop-control ] || mknod /dev/loop-control c 10 237
          for i in $(seq 0 63); do
            [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i
          done

      - name: Start Docker daemon (dind for the VolumeDriver e2e test, #312)
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          dockerd --host=unix:///var/run/docker.sock \
            --storage-driver=vfs \
            --iptables=false --ip-masq=false --bridge=none \
            >/tmp/dockerd.log 2>&1 &
          # Poll the daemon's HTTP `/_ping` endpoint directly via curl
          # over the unix socket. `docker info` was intermittently
          # unreliable here — it inherits ambient DOCKER_HOST / config
          # state and can hang for its full API timeout. `/_ping` is
          # the cheapest health check and gives an immediate answer.
          for i in $(seq 1 60); do
            if [ -S /var/run/docker.sock ] && \
               curl -fsS --max-time 2 --unix-socket /var/run/docker.sock \
                    http://localhost/_ping >/dev/null 2>&1; then
              echo "Docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "Docker daemon failed to start. Tail of log:"
          tail -100 /tmp/dockerd.log
          echo ""
          echo "Last docker info attempt output:"
          docker info 2>&1 || true
          exit 1

      - name: Check
        working-directory: neonfs_integration
        run: mix check

  # =========================================================================
  # neonfs_omnibus - Elixir + Rustler NIFs (contains core, nfs, fuse, etc)
  # =========================================================================
  neonfs_omnibus:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.elixir_rust_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_omnibus/deps
            neonfs_omnibus/_build
          key: v3-build-neonfs_omnibus-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_omnibus/mix.lock', 'neonfs_omnibus/native/neonfs_omnibus/Cargo.lock') }}
          restore-keys: v3-build-neonfs_omnibus-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_omnibus
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -qs dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_omnibus
        run: mix check
