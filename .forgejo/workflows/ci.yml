name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  MIX_ENV: test

jobs:
  # ==========================================================================
  # Resolve tool versions from .tool-versions so all jobs use the same images
  # ==========================================================================
  resolve-versions:
    runs-on: docker
    container:
      image: debian:trixie-20260316-slim
    outputs:
      elixir: ${{ steps.parse.outputs.elixir }}
      erlang: ${{ steps.parse.outputs.erlang }}
      rust: ${{ steps.parse.outputs.rust }}
      hexpm_image: ${{ steps.parse.outputs.hexpm_image }}
      rust_image: ${{ steps.parse.outputs.rust_image }}
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install -y --no-install-recommends nodejs git ca-certificates && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - id: parse
        run: |
          ELIXIR=$(awk '/^elixir/ {print $2}' .tool-versions)
          ERLANG=$(awk '/^erlang/ {print $2}' .tool-versions)
          RUST=$(awk '/^rust/ {print $2}' .tool-versions)
          echo "elixir=${ELIXIR}" >> "$GITHUB_OUTPUT"
          echo "erlang=${ERLANG}" >> "$GITHUB_OUTPUT"
          echo "rust=${RUST}" >> "$GITHUB_OUTPUT"
          echo "hexpm_image=hexpm/elixir:${ELIXIR}-erlang-${ERLANG}-debian-trixie-20260316-slim" >> "$GITHUB_OUTPUT"
          echo "rust_image=rust:${RUST}-slim-trixie" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # neonfs_client - Pure Elixir shared types & service discovery
  # =========================================================================
  neonfs_client:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install -y --no-install-recommends nodejs git ca-certificates && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
          key: v2-build-neonfs_client-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ hashFiles('neonfs_client/mix.lock') }}
          restore-keys: v2-build-neonfs_client-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_client
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_client
        run: |
          epmd -daemon
          mix check

  # =========================================================================
  # neonfs_core - Elixir + Rustler NIFs
  # =========================================================================
  neonfs_core:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_core/deps
            neonfs_core/_build
            neonfs_core/target
            neonfs_core/priv/native
          key: v2-build-neonfs_core-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_core/mix.lock', 'neonfs_core/Cargo.lock') }}
          restore-keys: v2-build-neonfs_core-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_core
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_core
        run: |
          epmd -daemon
          mix check

  # =========================================================================
  # neonfs_fuse - Elixir + Rustler NIFs
  # =========================================================================
  neonfs_fuse:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
      options: --privileged --device /dev/fuse
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs libfuse3-dev fuse3 \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_fuse/deps
            neonfs_fuse/_build
            neonfs_fuse/target
            neonfs_fuse/priv/native
          key: v2-build-neonfs_fuse-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_fuse/mix.lock', 'neonfs_fuse/Cargo.lock') }}
          restore-keys: v2-build-neonfs_fuse-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_fuse
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_fuse
        run: |
          epmd -daemon
          mix check

  # =========================================================================
  # neonfs_nfs - Elixir + Rustler NIFs (NFSv3 server)
  # =========================================================================
  neonfs_nfs:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_nfs/deps
            neonfs_nfs/_build
            neonfs_nfs/target
            neonfs_nfs/priv/native
          key: v2-build-neonfs_nfs-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_nfs/mix.lock', 'neonfs_nfs/native/neonfs_nfs/Cargo.lock') }}
          restore-keys: v2-build-neonfs_nfs-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_nfs
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Check
        working-directory: neonfs_nfs
        run: |
          epmd -daemon
          mix check

  # =========================================================================
  # neonfs-cli - Rust CLI
  # =========================================================================
  neonfs-cli:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.rust_image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            pkg-config libssl-dev git nodejs ca-certificates \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs-cli/target
          key: v2-build-neonfs-cli-${{ runner.arch }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs-cli/Cargo.lock') }}
          restore-keys: v2-build-neonfs-cli-${{ runner.arch }}-

      - name: Setup clippy
        run: rustup component add clippy

      - name: Build
        working-directory: neonfs-cli
        run: |
          cargo fetch
          cargo test --no-run --release

      - name: Test
        working-directory: neonfs-cli
        run: cargo test --jobs 1 --release

      - name: Clippy
        working-directory: neonfs-cli
        run: cargo clippy --all-targets --all-features -- -D warnings

  # =========================================================================
  # neonfs_integration - Integration tests
  # =========================================================================
  neonfs_integration:
    needs: resolve-versions
    runs-on: docker
    container:
      image: ${{ needs.resolve-versions.outputs.hexpm_image }}
      options: --privileged --device /dev/fuse
    steps:
      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential pkg-config curl ca-certificates git nodejs \
            libfuse3-dev fuse3 e2fsprogs mount \
          && rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "${{ needs.resolve-versions.outputs.rust }}"
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            neonfs_client/deps
            neonfs_client/_build
            neonfs_integration/deps
            neonfs_integration/_build
            neonfs_integration/target
            neonfs_integration/priv/native
            neonfs_core/target
            neonfs_core/priv/native
            neonfs_fuse/target
            neonfs_fuse/priv/native
          key: v2-build-neonfs_integration-${{ runner.arch }}-${{ needs.resolve-versions.outputs.elixir }}-${{ needs.resolve-versions.outputs.rust }}-${{ hashFiles('neonfs_integration/mix.lock', 'neonfs_core/Cargo.lock', 'neonfs_fuse/Cargo.lock') }}
          restore-keys: v2-build-neonfs_integration-${{ runner.arch }}-

      - name: Build
        working-directory: neonfs_integration
        run: |
          mix local.hex --force && mix local.rebar --force
          mix deps.get
          mix deps.compile
          mix compile
          if grep -sL dialyxir mix.exs; then mix dialyzer --plt --force-check; fi

      - name: Enable loopback devices
        run: |
          modprobe loop max_loop=64 || true
          [ -e /dev/loop-control ] || mknod /dev/loop-control c 10 237
          for i in $(seq 0 63); do
            [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i
          done

      - name: Check
        working-directory: neonfs_integration
        run: |
          epmd -daemon
          mix check

  # =========================================================================
  # containers - Native multi-arch builds
  # Build each architecture on its own native runner in parallel, then
  # combine into multi-arch manifests. No QEMU emulation needed.
  # Only runs on push (not PRs), after integration tests pass.
  # =========================================================================
  containers-amd64:
    runs-on: amd64
    needs: [neonfs_client, neonfs_core, neonfs_fuse, neonfs_nfs, neonfs_integration]
    if: forgejo.event_name == 'push'
    container:
      image: docker:29-dind
      options: --privileged

    steps:
      - name: Install checkout dependencies
        run: apk add --no-cache nodejs git

      - uses: actions/checkout@v6

      - name: Start Docker daemon
        run: |
          dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz &
          timeout 60 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login --username=james --password-stdin forgejo.dmz

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login --username=jimsynz --password-stdin ghcr.io

      - name: Set up Docker Buildx
        run: |
          cat > /tmp/buildkitd.toml << 'TOML'
          [registry."forgejo.dmz"]
            http = true
            insecure = true
          TOML
          docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
          docker buildx use builder

      - name: Build all targets (amd64)
        run: |
          TAG=${GITHUB_REF_NAME//\//-}-amd64
          for target in base cli core fuse nfs omnibus; do
            PLATFORMS=linux/amd64 TAG=$TAG ./containers/bake.sh --pull --load "$target"
          done

      - name: Push all images (amd64)
        run: |
          TAG=${GITHUB_REF_NAME//\//-}-amd64
          for image in core fuse nfs omnibus cli; do
            docker push "forgejo.dmz/project-neon/neonfs/${image}:${TAG}"
            docker push "ghcr.io/jimsynz/neonfs/${image}:${TAG}"
          done

  containers-arm64:
    runs-on: arm64
    needs: [neonfs_client, neonfs_core, neonfs_fuse, neonfs_nfs, neonfs_integration]
    if: forgejo.event_name == 'push'
    container:
      image: docker:29-dind
      options: --privileged

    steps:
      - name: Install checkout dependencies
        run: apk add --no-cache nodejs git

      - uses: actions/checkout@v6

      - name: Start Docker daemon
        run: |
          dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz &
          timeout 60 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login --username=james --password-stdin forgejo.dmz

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login --username=jimsynz --password-stdin ghcr.io

      - name: Set up Docker Buildx
        run: |
          cat > /tmp/buildkitd.toml << 'TOML'
          [registry."forgejo.dmz"]
            http = true
            insecure = true
          TOML
          docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
          docker buildx use builder

      - name: Build all targets (arm64)
        run: |
          TAG=${GITHUB_REF_NAME//\//-}-arm64
          for target in base cli core fuse nfs omnibus; do
            PLATFORMS=linux/arm64 TAG=$TAG ./containers/bake.sh --pull --load "$target"
          done

      - name: Push all images (arm64)
        run: |
          TAG=${GITHUB_REF_NAME//\//-}-arm64
          for image in core fuse nfs omnibus cli; do
            docker push "forgejo.dmz/project-neon/neonfs/${image}:${TAG}"
            docker push "ghcr.io/jimsynz/neonfs/${image}:${TAG}"
          done

  containers-manifest:
    runs-on: amd64
    needs: [containers-amd64, containers-arm64]
    container:
      image: docker:29-dind
      options: --privileged

    steps:
      - name: Start Docker daemon
        run: |
          dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz &
          timeout 60 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login --username=james --password-stdin forgejo.dmz

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login --username=jimsynz --password-stdin ghcr.io

      - name: Set up Docker Buildx
        run: |
          cat > /tmp/buildkitd.toml << 'TOML'
          [registry."forgejo.dmz"]
            http = true
            insecure = true
          TOML
          docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
          docker buildx use builder

      - name: Create multi-arch manifests
        run: |
          TAG=${GITHUB_REF_NAME//\//-}

          FORGEJO_IMAGES="core fuse nfs omnibus cli"
          GHCR_IMAGES="core fuse nfs omnibus cli"

          for image in $FORGEJO_IMAGES; do
            docker buildx imagetools create \
              -t forgejo.dmz/project-neon/neonfs/${image}:${TAG} \
              forgejo.dmz/project-neon/neonfs/${image}:${TAG}-amd64 \
              forgejo.dmz/project-neon/neonfs/${image}:${TAG}-arm64
          done

          for image in $GHCR_IMAGES; do
            docker buildx imagetools create \
              -t ghcr.io/jimsynz/neonfs/${image}:${TAG} \
              ghcr.io/jimsynz/neonfs/${image}:${TAG}-amd64 \
              ghcr.io/jimsynz/neonfs/${image}:${TAG}-arm64
          done
