name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential libssl-dev libncurses-dev

          # Install asdf
          git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
          echo '. $HOME/.asdf/asdf.sh' >> ~/.bashrc

      - name: Install Erlang, Elixir, Rust
        run: |
          . $HOME/.asdf/asdf.sh
          asdf plugin add erlang
          asdf plugin add elixir
          asdf plugin add rust
          asdf install

      - name: Setup Hex and Rebar
        run: |
          . $HOME/.asdf/asdf.sh
          mix local.hex --force
          mix local.rebar --force

      - name: Elixir format check
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix format --check-formatted
          cd ../neonfs_fuse && mix format --check-formatted

      - name: Credo
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix deps.get && mix credo --strict
          cd ../neonfs_fuse && mix deps.get && mix credo --strict

      - name: Rust format check
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core/native/neonfs_blob && cargo fmt --check
          cd ../../../neonfs_fuse/native/neonfs_fuse && cargo fmt --check
          cd ../../../neonfs-cli && cargo fmt --check

      - name: Clippy
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core/native/neonfs_blob && cargo clippy --all-targets -- -D warnings
          cd ../../../neonfs_fuse/native/neonfs_fuse && cargo clippy --all-targets --features fuse -- -D warnings
          cd ../../../neonfs-cli && cargo clippy --all-targets -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential libssl-dev libncurses-dev

          # Install asdf
          git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
          echo '. $HOME/.asdf/asdf.sh' >> ~/.bashrc

      - name: Install Erlang, Elixir, Rust
        run: |
          . $HOME/.asdf/asdf.sh
          asdf plugin add erlang
          asdf plugin add elixir
          asdf plugin add rust
          asdf install

      - name: Setup Hex and Rebar
        run: |
          . $HOME/.asdf/asdf.sh
          mix local.hex --force
          mix local.rebar --force

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            neonfs_core/deps
            neonfs_core/_build
            neonfs_fuse/deps
            neonfs_fuse/_build
            ~/.cargo/registry
            ~/.cargo/git
            neonfs_core/native/neonfs_blob/target
            neonfs_fuse/native/neonfs_fuse/target
            neonfs-cli/target
          key: ${{ runner.os }}-test-${{ hashFiles('**/mix.lock', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: Get Elixir dependencies
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix deps.get
          cd ../neonfs_fuse && mix deps.get

      - name: Compile Elixir
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix compile
          cd ../neonfs_fuse && mix compile

      - name: Elixir unit tests
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix test --exclude integration
          cd ../neonfs_fuse && mix test --exclude integration --exclude fuse

      - name: Rust unit tests
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core/native/neonfs_blob && cargo test
          cd ../../../neonfs_fuse/native/neonfs_fuse && cargo test
          cd ../../../neonfs-cli && cargo test

  dialyzer:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential libssl-dev libncurses-dev

          # Install asdf
          git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
          echo '. $HOME/.asdf/asdf.sh' >> ~/.bashrc

      - name: Install Erlang, Elixir, Rust
        run: |
          . $HOME/.asdf/asdf.sh
          asdf plugin add erlang
          asdf plugin add elixir
          asdf plugin add rust
          asdf install

      - name: Setup Hex and Rebar
        run: |
          . $HOME/.asdf/asdf.sh
          mix local.hex --force
          mix local.rebar --force

      - name: Cache PLTs
        uses: actions/cache@v4
        with:
          path: |
            neonfs_core/priv/plts
            neonfs_fuse/priv/plts
          key: plt-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            plt-

      - name: Get dependencies and compile
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix deps.get && mix compile
          cd ../neonfs_fuse && mix deps.get && mix compile

      - name: Run Dialyzer
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && mix dialyzer
          cd ../neonfs_fuse && mix dialyzer

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    container:
      image: debian:bookworm
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential libssl-dev libncurses-dev \
            libfuse3-dev fuse3 procps

          # Install asdf
          git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
          echo '. $HOME/.asdf/asdf.sh' >> ~/.bashrc

      - name: Install Erlang, Elixir, Rust
        run: |
          . $HOME/.asdf/asdf.sh
          asdf plugin add erlang
          asdf plugin add elixir
          asdf plugin add rust
          asdf install

      - name: Setup Hex and Rebar
        run: |
          . $HOME/.asdf/asdf.sh
          mix local.hex --force
          mix local.rebar --force

      - name: Run acceptance tests
        run: |
          . $HOME/.asdf/asdf.sh
          ./scripts/acceptance-test.sh

  build-release:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential libssl-dev libncurses-dev

          # Install asdf
          git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
          echo '. $HOME/.asdf/asdf.sh' >> ~/.bashrc

      - name: Install Erlang, Elixir, Rust
        run: |
          . $HOME/.asdf/asdf.sh
          asdf plugin add erlang
          asdf plugin add elixir
          asdf plugin add rust
          asdf install

      - name: Setup Hex and Rebar
        run: |
          . $HOME/.asdf/asdf.sh
          mix local.hex --force
          mix local.rebar --force

      - name: Build releases
        run: |
          . $HOME/.asdf/asdf.sh
          cd neonfs_core && MIX_ENV=prod mix do deps.get, compile, release
          cd ../neonfs_fuse && MIX_ENV=prod mix do deps.get, compile, release
          cd ../neonfs-cli && cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: |
            neonfs_core/_build/prod/*.tar.gz
            neonfs_fuse/_build/prod/*.tar.gz
            neonfs-cli/target/release/neonfs
