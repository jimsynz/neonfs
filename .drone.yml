---
# ===========================================================================
# Container builds - only after all tests pass
# ===========================================================================
kind: pipeline
type: docker
name: containers

trigger:
  branch:
    exclude:
      - pull_request

depends_on:
  - neonfs_integration

services:
  - name: docker
    image: docker:29.1.1-dind
    privileged: true
    commands:
      - dockerd --host=unix:///var/run/docker.sock --insecure-registry=forgejo.dmz --dns=192.168.1.1
    volumes:
      - name: dockersock
        path: /var/run

steps:
  - name: build and push (main)
    image: docker:29.1.1-dind
    when:
      branch: [main]
    volumes:
      - name: dockersock
        path: /var/run
    environment:
      DOCKER_PASSWORD:
        from_secret: REGISTRY_TOKEN
    commands:
      - sleep 5
      - docker login --username=james --password=$DOCKER_PASSWORD forgejo.dmz
      - docker run --privileged --rm tonistiigi/binfmt --install all
      - |
        cat > /tmp/buildkitd.toml << 'TOML'
        [registry."forgejo.dmz"]
          http = true
          insecure = true
        TOML
      - docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
      - docker buildx use builder
      - docker buildx bake -f bake.hcl --push

  - name: build and push (branch)
    image: docker:29.1.1-dind
    when:
      branch:
        exclude: [main]
    volumes:
      - name: dockersock
        path: /var/run
    environment:
      DOCKER_PASSWORD:
        from_secret: REGISTRY_TOKEN
    commands:
      - sleep 5
      - docker login --username=james --password=$DOCKER_PASSWORD forgejo.dmz
      - docker run --privileged --rm tonistiigi/binfmt --install all
      - |
        cat > /tmp/buildkitd.toml << 'TOML'
        [registry."forgejo.dmz"]
          http = true
          insecure = true
        TOML
      - docker buildx create --name builder --config /tmp/buildkitd.toml --driver-opt network=host
      - docker buildx use builder
      - TAG=${DRONE_BRANCH/\//-} docker buildx bake -f bake.hcl --push

volumes:
  - name: dockersock
    temp: {}
