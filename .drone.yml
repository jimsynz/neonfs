---
# ===========================================================================
# neonfs-cli - Rust CLI
# ===========================================================================
kind: pipeline
type: docker
name: neonfs-cli

depends_on:
  - setup

environment:
  ASDF_DATA_DIR: /drone/src/.asdf
  ASDF_DIR: /root/.asdf
  CARGO_HOME: /drone/src/.cargo

steps:
  - name: restore ASDF cache
    image: meltwater/drone-cache
    pull: always
    settings:
      restore: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}'
      remote_root: asdf
      mount:
        - .asdf
    volumes:
      - name: cache
        path: /tmp/cache

  - name: restore build cache
    image: meltwater/drone-cache
    pull: never
    settings:
      restore: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}/{{ checksum "neonfs-cli/Cargo.lock" }}'
      remote_root: ${DRONE_REPO_OWNER}/${DRONE_REPO_NAME}/neonfs-cli/build
      mount:
        - .cargo
        - neonfs-cli/target
    volumes:
      - name: cache
        path: /tmp/cache

  - name: setup
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - restore ASDF cache
      - restore build cache
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs-cli
      - rustup component add clippy

  - name: build
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - setup
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs-cli
      - cargo fetch
      - cargo test --no-run --release

  - name: store build cache
    depends_on:
      - build
    image: meltwater/drone-cache
    pull: never
    settings:
      rebuild: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}/{{ checksum "neonfs-cli/Cargo.lock" }}'
      remote_root: ${DRONE_REPO_OWNER}/${DRONE_REPO_NAME}/neonfs-cli/build
      mount:
        - .cargo
        - neonfs-cli/target
    volumes:
      - name: cache
        path: /tmp/cache

  - name: cargo test
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - build
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs-cli
      - cargo test --jobs 1 --release

  - name: cargo clippy
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - build
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs-cli
      - cargo clippy --all-targets --all-features -- -D warnings

volumes:
  - name: cache
    host:
      path: /var/tmp/drone-cache

