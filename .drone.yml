# ===========================================================================
# setup - Install ASDF toolchain once for all pipelines
# ===========================================================================
kind: pipeline
type: docker
name: setup

environment:
  ASDF_DATA_DIR: /drone/src/.asdf
  ASDF_DIR: /root/.asdf

steps:
  - name: restore ASDF cache
    image: meltwater/drone-cache
    pull: always
    settings:
      restore: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}'
      remote_root: asdf
      mount:
        - .asdf
    volumes:
      - name: cache
        path: /tmp/cache

  - name: install ASDF
    image: harton.dev/james/asdf_container:latest
    pull: always
    depends_on:
      - restore ASDF cache
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - asdf_install
      - asdf reshim

  - name: store ASDF cache
    depends_on:
      - install ASDF
    image: meltwater/drone-cache
    pull: never
    settings:
      rebuild: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}'
      remote_root: asdf
      mount:
        - .asdf
    volumes:
      - name: cache
        path: /tmp/cache

volumes:
  - name: cache
    host:
      path: /var/tmp/drone-cache

---
# ===========================================================================
# neonfs_core - Elixir + Rustler NIFs
# ===========================================================================
kind: pipeline
type: docker
name: neonfs_core

depends_on:
  - setup

environment:
  ASDF_DATA_DIR: /drone/src/.asdf
  ASDF_DIR: /root/.asdf
  HEX_HOME: /drone/src/.hex
  MIX_ARCHIVES: /drone/src/.mix
  MIX_ENV: test
  MIX_HOME: /drone/src/.mix
  REBAR_BASE_DIR: /drone/src/.rebar3

steps:
  - name: restore ASDF cache
    image: meltwater/drone-cache
    pull: always
    settings:
      restore: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}'
      remote_root: asdf
      mount:
        - .asdf
    volumes:
      - name: cache
        path: /tmp/cache

  - name: restore build cache
    image: meltwater/drone-cache
    pull: never
    settings:
      restore: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}/{{ checksum "neonfs_core/mix.lock" }}'
      remote_root: ${DRONE_REPO_OWNER}/${DRONE_REPO_NAME}/neonfs_core/build
      mount:
        - neonfs_core/deps
        - neonfs_core/_build
        - .hex
        - .mix
        - .rebar3
    volumes:
      - name: cache
        path: /tmp/cache

  - name: setup
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - restore ASDF cache
      - restore build cache
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs_core
      - mix local.hex --if-missing --force
      - mix local.rebar --if-missing --force

  - name: build
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - setup
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs_core
      - mix deps.get
      - mix deps.compile
      - if grep -sL dialyxir mix.exs; then mix dialyzer --plt ; fi

  - name: store build cache
    depends_on:
      - build
    image: meltwater/drone-cache
    pull: never
    settings:
      rebuild: true
      backend: filesystem
      cache_key: '{{ checksum ".tool-versions" }}/{{ checksum "neonfs_core/mix.lock" }}'
      remote_root: ${DRONE_REPO_OWNER}/${DRONE_REPO_NAME}/neonfs_core/build
      mount:
        - neonfs_core/deps
        - neonfs_core/_build
        - .hex
        - .mix
        - .rebar3
    volumes:
      - name: cache
        path: /tmp/cache

  - name: mix check
    image: harton.dev/james/asdf_container:latest
    pull: never
    depends_on:
      - store build cache
    commands:
      - export PATH="$ASDF_DATA_DIR/shims:$PATH"
      - cd neonfs_core
      - epmd -daemon
      - mix check

volumes:
  - name: cache
    host:
      path: /var/tmp/drone-cache

