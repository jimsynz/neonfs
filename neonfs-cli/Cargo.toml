[package]
name = "neonfs-cli"
version = "0.1.0"
edition = "2021"
authors = ["NeonFS Contributors"]
description = "Command-line interface for NeonFS distributed filesystem"
license = "MIT"

[[bin]]
name = "neonfs-cli"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
thiserror = "2.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Erlang distribution (for daemon communication)
# Phase 1: Simplified ETF-based RPC (EPMD lookup + custom protocol)
# Phase 2: Full Erlang distribution protocol (erl_dist if available)
eetf = "0.6"       # Erlang External Term Format (tokio "full" already includes net, io-util, time)
hex = "0.4"        # For cookie encoding
rand = "0.9"       # For generating node names

[dev-dependencies]
tempfile = "3"
