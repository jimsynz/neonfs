# NeonFS CIFS bridge configuration
# Sourced by neonfs-cifs.service (in addition to /etc/neonfs/neonfs.conf).
# These are the CIFS-specific knobs; shared cluster/node settings live in
# /etc/neonfs/neonfs.conf.

# Unix socket the Samba `vfs_neonfs.so` module (loaded by smbd) dials.
# Must match `neonfs:socket = …` in your smb.conf share (see below).
# NEONFS_CIFS_SOCKET=/run/neonfs/cifs.sock

# Node name for the CIFS bridge (defaults to neonfs_cifs@$(hostname -f)).
# NEONFS_CIFS_NODE=neonfs_cifs@cifs1.example.com

# --- Samba side -------------------------------------------------------------
# This package installs the Samba VFS module at
#   /usr/lib/<arch>-linux-gnu/samba/vfs/neonfs.so
# built against this Debian release's Samba (its interface version must match
# the host smbd). Wire a share to a NeonFS volume in /etc/samba/smb.conf:
#
#   [myvolume]
#     vfs objects = neonfs
#     neonfs:socket = /run/neonfs/cifs.sock
#     neonfs:volume = myvolume
#     read only = no
#
# then `systemctl restart smbd`. The bridge (this service) and smbd are
# separate units; start this one before serving the share.
