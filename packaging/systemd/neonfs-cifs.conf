# NeonFS CIFS bridge configuration
# Sourced by neonfs-cifs.service (in addition to /etc/neonfs/neonfs.conf).
# These are the CIFS-specific knobs; shared cluster/node settings live in
# /etc/neonfs/neonfs.conf.

# Unix socket the Samba `vfs_neonfs.so` module (loaded by smbd) dials.
# Must match `neonfs:socket = …` in your smb.conf share (see below).
# NEONFS_CIFS_SOCKET=/run/neonfs/cifs.sock

# Node name for the CIFS bridge (defaults to neonfs_cifs@$(hostname -f)).
# NEONFS_CIFS_NODE=neonfs_cifs@cifs1.example.com

# --- Samba side -------------------------------------------------------------
# The Samba VFS module ships in the samba-vfs-neonfs package (a dependency of
# this one), installed at
#   /usr/lib/<arch>-linux-gnu/samba/vfs/neonfs.so
# It is built from the distro's own Samba source, so it loads in the host smbd.
# Wire a share to a NeonFS volume in /etc/samba/smb.conf:
#
#   [myvolume]
#     vfs objects = neonfs
#     neonfs:socket = /run/neonfs/cifs.sock
#     neonfs:volume = myvolume
#     read only = no
#     admin users = neonfs
#
# then `systemctl restart smbd`. The bridge (this service) and smbd are
# separate units; start this one before serving the share.
#
# `admin users` lists the SMB principal(s) that connect to the share. NeonFS
# does not model POSIX uid/gid ownership (the VFS fchown is :enosys), so the
# volume root reports mode 0o40755 owned by root and smbd's own POSIX check
# would deny a non-root user's writes with NT_STATUS_ACCESS_DENIED before the
# VFS is ever called. `admin users` bypasses that check for authenticated
# principals — the NeonFS trust boundary is the bridge socket plus Samba's own
# auth, not smbd's POSIX layer. See neonfs_cifs/README.md for the full model.
