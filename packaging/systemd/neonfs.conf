# NeonFS Environment Configuration
# This file is sourced by systemd and provides environment variables for the daemon
#
# Override by creating /etc/systemd/system/neonfs-*.service.d/override.conf:
#   [Service]
#   EnvironmentFile=/etc/neonfs/neonfs.conf

# Core node name (must be unique in cluster)
# For single-node: neonfs_core@localhost
# For multi-node: neonfs_core@hostname.domain or neonfs_core@ip
NEONFS_CORE_NODE=neonfs_core@localhost

# FUSE node name (must be unique per mount host)
# For single-node: neonfs_fuse@localhost
# For multi-node: neonfs_fuse@hostname.domain or neonfs_fuse@ip
NEONFS_FUSE_NODE=neonfs_fuse@localhost

# NFS node name (must be unique per NFS server host)
# For single-node: neonfs_nfs@localhost
# For multi-node: neonfs_nfs@hostname.domain or neonfs_nfs@ip
NEONFS_NFS_NODE=neonfs_nfs@localhost

# Omnibus node name (runs core + FUSE + NFS in a single BEAM node)
# For single-node: neonfs@localhost
# For multi-node: neonfs@hostname.domain or neonfs@ip
NEONFS_OMNIBUS_NODE=neonfs@localhost

# Path to Erlang cookie file for authentication
# All services must use the same cookie for inter-node communication
RELEASE_COOKIE_PATH=/var/lib/neonfs/.erlang.cookie

# Data directory for chunk storage, metadata, and WAL
NEONFS_DATA_DIR=/var/lib/neonfs

# Release installation directories
NEONFS_CORE_ROOT=/usr/lib/neonfs/core
NEONFS_FUSE_ROOT=/usr/lib/neonfs/fuse
NEONFS_NFS_ROOT=/usr/lib/neonfs/nfs
NEONFS_OMNIBUS_ROOT=/usr/lib/neonfs/omnibus

# BEAM VM configuration
ERL_MAX_PORTS=65536
ERL_MAX_ETS_TABLES=16384

# Logging
RELEASE_LOG_LEVEL=info

# Distribution port range (optional, helps with firewall rules)
# BEAM will allocate a port in this range for Erlang distribution
# ELIXIR_ERL_OPTIONS="-kernel inet_dist_listen_min 9100 inet_dist_listen_max 9155"
