# NeonFS Environment Configuration
# This file is sourced by systemd and provides environment variables for the daemon
#
# Override by creating /etc/systemd/system/neonfs-*.service.d/override.conf:
#   [Service]
#   EnvironmentFile=/etc/neonfs/neonfs.conf

# Node names default to service@$(hostname -f) when unset.
# Override here for specific node names, e.g.:
#   NEONFS_CORE_NODE=neonfs_core@core1.example.com
# NEONFS_CORE_NODE=
# NEONFS_FUSE_NODE=
# NEONFS_NFS_NODE=
# NEONFS_S3_NODE=
# NEONFS_OMNIBUS_NODE=

# Path to Erlang cookie file for authentication
# All services must use the same cookie for inter-node communication
RELEASE_COOKIE_PATH=/var/lib/neonfs/.erlang.cookie

# Data directory for chunk storage, metadata, and WAL
NEONFS_DATA_DIR=/var/lib/neonfs

# Release installation directories
NEONFS_CORE_ROOT=/usr/lib/neonfs/core
NEONFS_FUSE_ROOT=/usr/lib/neonfs/fuse
NEONFS_NFS_ROOT=/usr/lib/neonfs/nfs
NEONFS_S3_ROOT=/usr/lib/neonfs/s3
NEONFS_OMNIBUS_ROOT=/usr/lib/neonfs/omnibus

# BEAM VM configuration
ERL_MAX_PORTS=65536
ERL_MAX_ETS_TABLES=16384

# Logging
RELEASE_LOG_LEVEL=info

# TLS distribution certificates directory
# Local CA, daemon cert, and CLI cert are generated here on first boot
NEONFS_TLS_DIR=/var/lib/neonfs/tls

# S3 API gateway configuration
# NEONFS_S3_BIND=0.0.0.0
# NEONFS_S3_PORT=8080
# NEONFS_S3_REGION=neonfs
# NEONFS_S3_METRICS=false
# NEONFS_S3_METRICS_PORT=9571
# NEONFS_S3_METRICS_BIND=0.0.0.0

# Erlang distribution port (random per-node, persisted across restarts)
# Auto-generated on first boot and stored in /var/lib/neonfs/meta/dist_port.
# Set explicitly to override the auto-generated port:
# NEONFS_DIST_PORT=9100
