# NeonFS Environment Configuration
# This file is sourced by systemd and provides environment variables for the daemon
#
# Override by creating /etc/systemd/system/neonfs.service.d/override.conf:
#   [Service]
#   EnvironmentFile=/etc/neonfs/neonfs.conf

# Node name (must be unique in cluster)
# For single-node: neonfs@localhost
# For multi-node: neonfs@hostname.domain or neonfs@ip
RELEASE_NODE=neonfs@localhost

# Path to Erlang cookie file for authentication
RELEASE_COOKIE_PATH=/var/lib/neonfs/.erlang.cookie

# Data directory for chunk storage, metadata, and WAL
NEONFS_DATA_DIR=/var/lib/neonfs

# Release installation directory
RELEASE_ROOT=/usr/lib/neonfs

# BEAM VM configuration
ERL_MAX_PORTS=65536
ERL_MAX_ETS_TABLES=16384

# Logging
RELEASE_LOG_LEVEL=info

# Distribution port range (optional, helps with firewall rules)
# BEAM will allocate a port in this range for Erlang distribution
# ELIXIR_ERL_OPTIONS="-kernel inet_dist_listen_min 9100 inet_dist_listen_max 9155"
