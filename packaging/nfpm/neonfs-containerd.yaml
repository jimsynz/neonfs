name: neonfs-containerd
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS containerd content store plugin daemon"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates

recommends:
  - containerd

conflicts:
  - neonfs-omnibus

contents:
  - src: "${BUILD_DIR}/neonfs_containerd/_build/prod/rel/neonfs_containerd/"
    dst: /usr/lib/neonfs/containerd/
    type: tree

  - src: ../systemd/neonfs-containerd.service
    dst: /usr/lib/systemd/system/neonfs-containerd.service

  - src: ../systemd/neonfs-containerd-daemon
    dst: /usr/bin/neonfs-containerd-daemon
    file_info:
      mode: 0755

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
