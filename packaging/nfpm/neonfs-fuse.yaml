name: neonfs-fuse
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS FUSE filesystem daemon for POSIX-compatible mounts"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates
  - libfuse3-4
  - fuse3

conflicts:
  - neonfs-omnibus

contents:
  - src: "${BUILD_DIR}/neonfs_fuse/_build/prod/rel/neonfs_fuse/"
    dst: /usr/lib/neonfs/fuse/

  - src: ../systemd/neonfs-fuse.service
    dst: /usr/lib/systemd/system/neonfs-fuse.service

  - src: ../systemd/neonfs-fuse-daemon
    dst: /usr/bin/neonfs-fuse-daemon
    file_info:
      mode: 0755

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
