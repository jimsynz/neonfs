name: neonfs-webdav
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"
description: "NeonFS WebDAV server daemon"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates

conflicts:
  - neonfs-omnibus

contents:
  - src: "${BUILD_DIR}/neonfs_webdav/_build/prod/rel/neonfs_webdav/"
    dst: /usr/lib/neonfs/webdav/
    type: tree

  - src: ../systemd/neonfs-webdav.service
    dst: /usr/lib/systemd/system/neonfs-webdav.service

  - src: ../systemd/neonfs-webdav-daemon
    dst: /usr/bin/neonfs-webdav-daemon
    file_info:
      mode: 0755

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
