name: neonfs-docker
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS Docker VolumeDriver plugin daemon"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates

recommends:
  - docker.io | docker-ce | podman

conflicts:
  - neonfs-omnibus

contents:
  - src: "${BUILD_DIR}/neonfs_docker/_build/prod/rel/neonfs_docker/"
    dst: /usr/lib/neonfs/docker/
    type: tree

  - src: ../systemd/neonfs-docker.service
    dst: /usr/lib/systemd/system/neonfs-docker.service

  - src: ../systemd/neonfs-docker-daemon
    dst: /usr/bin/neonfs-docker-daemon
    file_info:
      mode: 0755

  - dst: /etc/docker/plugins
    type: dir
    file_info:
      mode: 0755

  - src: ../docker/neonfs.spec
    dst: /etc/docker/plugins/neonfs.spec
    file_info:
      mode: 0644

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
