name: neonfs-s3
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"
description: "NeonFS S3-compatible API gateway daemon"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates

conflicts:
  - neonfs-omnibus

contents:
  - src: "${BUILD_DIR}/neonfs_s3/_build/prod/rel/neonfs_s3/"
    dst: /usr/lib/neonfs/s3/
    type: tree

  - src: ../systemd/neonfs-s3.service
    dst: /usr/lib/systemd/system/neonfs-s3.service

  - src: ../systemd/neonfs-s3-daemon
    dst: /usr/bin/neonfs-s3-daemon
    file_info:
      mode: 0755

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
