name: neonfs-cifs
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS CIFS/SMB bridge (Samba VFS backend)"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates
  # The Samba VFS module ships in its own package (built from the distro samba
  # source so it loads in the host smbd — #1548); it pulls in the ABI-matching
  # samba as its own dependency.
  - samba-vfs-neonfs

conflicts:
  - neonfs-omnibus

contents:
  - src: "${BUILD_DIR}/neonfs_cifs/_build/prod/rel/neonfs_cifs/"
    dst: /usr/lib/neonfs/cifs/
    type: tree

  - src: ../systemd/neonfs-cifs.service
    dst: /usr/lib/systemd/system/neonfs-cifs.service

  - src: ../systemd/neonfs-cifs-daemon
    dst: /usr/bin/neonfs-cifs-daemon
    file_info:
      mode: 0755

  - src: ../systemd/neonfs-cifs.conf
    dst: /etc/neonfs/cifs.conf
    type: config|noreplace

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
