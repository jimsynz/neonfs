name: neonfs-omnibus
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS all-in-one daemon (core + FUSE + NFS + S3 + WebDAV in a single node)"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates
  - libfuse3-4
  - fuse3
  - nfs-common
  # The shipped neonfs.so is a Samba VFS module built against this release's
  # Samba; samba-vfs-modules provides the ABI-matching smbd + the VFS dir.
  - samba-vfs-modules

conflicts:
  - neonfs-core
  - neonfs-fuse
  - neonfs-nfs
  - neonfs-s3
  - neonfs-webdav
  - neonfs-cifs

contents:
  - src: "${BUILD_DIR}/neonfs_omnibus/_build/prod/rel/neonfs_omnibus/"
    dst: /usr/lib/neonfs/omnibus/
    type: tree

  # Samba VFS module for a co-located smbd (same on-disk name and multiarch
  # path as the standalone neonfs-cifs deb). Built against this Debian
  # release's Samba (#1527). The build substitutes the OMNIBUS_VFS_CONTENT
  # placeholder below with the module's content entry only when the module was
  # compiled — empty otherwise (e.g. the test-rig's unprivileged deb build,
  # which skips the heavy in-tree Samba build).
${OMNIBUS_VFS_CONTENT}

  - src: ../systemd/neonfs-omnibus.service
    dst: /usr/lib/systemd/system/neonfs-omnibus.service

  - src: ../systemd/neonfs-omnibus-daemon
    dst: /usr/bin/neonfs-omnibus-daemon
    file_info:
      mode: 0755

  - dst: /etc/docker/plugins
    type: dir
    file_info:
      mode: 0755

  - src: ../docker/neonfs.spec
    dst: /etc/docker/plugins/neonfs.spec
    file_info:
      mode: 0644

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
