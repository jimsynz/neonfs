name: neonfs-omnibus
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS all-in-one daemon (core + FUSE + NFS + S3 + WebDAV in a single node)"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - neonfs-common (= ${VERSION})
  - neonfs-cli (= ${VERSION})
  - libstdc++6
  - openssl
  - libssl3t64
  - libncurses6
  - ca-certificates
  - libfuse3-4
  - fuse3
  - nfs-common
  # The Samba VFS module ships in its own package (built from the distro samba
  # source so it loads in the host smbd — #1548); it pulls in the ABI-matching
  # samba as its own dependency.
  - samba-vfs-neonfs

conflicts:
  - neonfs-core
  - neonfs-fuse
  - neonfs-nfs
  - neonfs-s3
  - neonfs-webdav
  - neonfs-cifs

contents:
  - src: "${BUILD_DIR}/neonfs_omnibus/_build/prod/rel/neonfs_omnibus/"
    dst: /usr/lib/neonfs/omnibus/
    type: tree

  - src: ../systemd/neonfs-omnibus.service
    dst: /usr/lib/systemd/system/neonfs-omnibus.service

  - src: ../systemd/neonfs-omnibus-daemon
    dst: /usr/bin/neonfs-omnibus-daemon
    file_info:
      mode: 0755

  - dst: /etc/docker/plugins
    type: dir
    file_info:
      mode: 0755

  - src: ../docker/neonfs.spec
    dst: /etc/docker/plugins/neonfs.spec
    file_info:
      mode: 0644

scripts:
  postinstall: ../scripts/post-install.sh
  preremove: ../scripts/pre-remove.sh
