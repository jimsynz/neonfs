name: neonfs-common
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
section: net
priority: optional
maintainer: "James Harton <james@harton.dev>"
description: "NeonFS shared configuration and system user"
vendor: "harton.dev"
homepage: "https://harton.dev/project-neon/neonfs"
license: "Apache-2.0"

depends:
  - hostname

contents:
  - src: ../systemd/neonfs.conf
    dst: /etc/neonfs/neonfs.conf
    type: config|noreplace

  - src: ../systemd/neonfs-tls-common.sh
    dst: /usr/lib/neonfs/neonfs-tls-common.sh
    file_info:
      mode: 0755

scripts:
  preinstall: ../scripts/pre-install.sh
  postinstall: ../scripts/post-install.sh
  postremove: ../scripts/post-remove.sh
