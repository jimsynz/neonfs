services:
  dev:
    image: harton.dev/project-neon/neonfs-dev:latest
    build:
      context: .
      dockerfile: Containerfile.dev
      cache_from:
        - harton.dev/james/asdf_container:latest
        - harton.dev/project-neon/neonfs-dev:latest
    container_name: neonfs-dev
    hostname: neonfs-dev
    volumes:
      - .:/workdir
      - home:/home/dev
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    stdin_open: true
    tty: true
    working_dir: /workdir
    environment:
      # Enable FUSE feature for Rust builds
      - CARGO_FEATURE_FUSE=1
      # Development environment
      - MIX_ENV=dev
      - RUST_BACKTRACE=1
    command: /bin/zsh

volumes:
  home:
