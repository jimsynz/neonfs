# Source: neonfs-csi/templates/node-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: release-neonfs-csi-node
  namespace: neonfs-csi
  labels:
    app.kubernetes.io/name: neonfs-csi
    app.kubernetes.io/instance: release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    helm.sh/chart: neonfs-csi-0.1.0
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: neonfs-csi
      app.kubernetes.io/instance: release
      app.kubernetes.io/component: node
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonfs-csi
        app.kubernetes.io/instance: release
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/version: "0.1.0"
        helm.sh/chart: neonfs-csi-0.1.0
        app.kubernetes.io/name: neonfs-csi
        app.kubernetes.io/instance: release
        app.kubernetes.io/component: node
    spec:
      serviceAccountName: release-neonfs-csi-node
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.12.0
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
            - --v=2
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: /var/lib/kubelet/plugins/neonfs.csi.harton.dev/csi.sock
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: registry.k8s.io/sig-storage/livenessprobe:v2.14.0
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=/csi/csi.sock
            - --health-port=29653
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
        - name: neonfs-csi
          image: ghcr.io/jimsynz/neonfs/csi:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - node
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
            allowPrivilegeEscalation: true
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: NEONFS_CSI_MODE
              value: node
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NEONFS_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: release-neonfs-csi-bootstrap
                  key: token
                  optional: true
          ports:
            - containerPort: 29653
              name: healthz
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: pods-mount-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
            - name: fuse-device
              mountPath: /dev/fuse
      volumes:
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/neonfs.csi.harton.dev/
            type: DirectoryOrCreate
        - name: pods-mount-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: Directory
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
