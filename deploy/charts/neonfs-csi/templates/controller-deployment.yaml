apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neonfs-csi.controllerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neonfs-csi.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "neonfs-csi.controllerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "neonfs-csi.commonLabels" . | nindent 8 }}
        {{- include "neonfs-csi.controllerSelectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "neonfs-csi.controllerServiceAccount" . }}
      hostNetwork: {{ .Values.controller.hostNetwork }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-provisioner
          image: {{ .Values.sidecars.provisioner.image }}
          imagePullPolicy: {{ .Values.sidecars.provisioner.pullPolicy }}
          args:
            - --csi-address=$(ADDRESS)
            - --leader-election=true
            - --feature-gates=Topology=true
            - --extra-create-metadata=true
            - --v=2
            {{- with .Values.sidecars.provisioner.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: ADDRESS
              value: {{ .Values.controller.socketPath }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ dir .Values.controller.socketPath }}
        - name: csi-attacher
          image: {{ .Values.sidecars.attacher.image }}
          imagePullPolicy: {{ .Values.sidecars.attacher.pullPolicy }}
          args:
            - --csi-address=$(ADDRESS)
            - --leader-election=true
            - --v=2
            {{- with .Values.sidecars.attacher.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: ADDRESS
              value: {{ .Values.controller.socketPath }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ dir .Values.controller.socketPath }}
        - name: csi-resizer
          image: {{ .Values.sidecars.resizer.image }}
          imagePullPolicy: {{ .Values.sidecars.resizer.pullPolicy }}
          args:
            - --csi-address=$(ADDRESS)
            - --leader-election=true
            - --v=2
            {{- with .Values.sidecars.resizer.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: ADDRESS
              value: {{ .Values.controller.socketPath }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ dir .Values.controller.socketPath }}
        - name: liveness-probe
          image: {{ .Values.sidecars.livenessProbe.image }}
          imagePullPolicy: {{ .Values.sidecars.livenessProbe.pullPolicy }}
          args:
            - --csi-address=$(ADDRESS)
            - --health-port={{ .Values.controller.livenessProbe.healthPort }}
          env:
            - name: ADDRESS
              value: {{ .Values.controller.socketPath }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ dir .Values.controller.socketPath }}
        - name: neonfs-csi
          image: {{ include "neonfs-csi.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - controller
          env:
            - name: CSI_ENDPOINT
              value: unix://{{ .Values.controller.socketPath }}
            - name: NEONFS_CSI_MODE
              value: controller
            - name: NEONFS_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "neonfs-csi.bootstrapSecretName" . }}
                  key: {{ .Values.bootstrap.secretKey }}
                  optional: true
          ports:
            - containerPort: {{ .Values.controller.livenessProbe.healthPort }}
              name: healthz
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ dir .Values.controller.socketPath }}
      volumes:
        - name: socket-dir
          emptyDir: {}
